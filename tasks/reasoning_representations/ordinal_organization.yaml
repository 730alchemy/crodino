---
element_id: ordinal_organization
element_name: "Ordinal Organization"
category: reasoning_representations

prompt: |
  You are advising a startup on which of five candidate features to prioritize
  for their next product release. You do NOT have exact data — only qualitative
  assessments. Your task is to reason ordinally (relative ranking, not exact values).

  Features under consideration:
  F1: Dark mode
  F2: Offline sync
  F3: Multi-language support (10 languages)
  F4: Advanced analytics dashboard
  F5: Third-party integrations (API)

  Known qualitative assessments:
  - F2 (offline sync) is harder to implement than F1 (dark mode)
  - F5 (API) is harder than F3 (multi-language) but easier than F2
  - F4 is harder than F5 but easier than F2
  - F3 (multi-language) generates more user demand signals than F1
  - F1 (dark mode) generates more user demand signals than F4 or F5
  - F2 generates the highest user demand of all five
  - F4 generates less user demand than F3

  Tasks:
  (a) Produce a full ordinal ranking of all 5 features on BOTH dimensions
      (implementation difficulty and user demand), from lowest to highest.

  (b) Compute a simple "priority score" = user_demand_rank - difficulty_rank
      for each feature (higher score = higher net priority). Rank by priority score.

  (c) The startup can only ship features with combined difficulty ≤ top 2 difficulty units.
      Which combination(s) of features maximize user demand coverage under this constraint?

  (d) A new assessment arrives: "F3 is actually harder than F4." Revise the difficulty
      ranking and recompute priority scores.

success_criteria:
  - "(a) Correct difficulty order: F1 < F3 < F5 < F4 < F2; correct demand order: F4 < F5 ≤ F1 < F3 < F2"
  - (b) Priority scores computed correctly from the rankings
  - (c) Correctly identifies combinations within the constraint
  - (d) Revised ranking: F1 < F5 < F4 < F3 < F2 (swaps F3 and F4)

rubric:
  ordinal_derivation:
    weight: 0.35
    criteria: >
      Both ordinal rankings are correctly derived from the given qualitative
      constraints without introducing exact numerical assumptions. Difficulty:
      F1 < F3 < F5 < F4 < F2. Demand: F4 < F5 < F1 < F3 < F2 (F1 vs F5 ambiguous
      in demand — both stated as less than F3; F1 stated as more than F4 or F5).
    scores:
      excellent: "Both rankings correct with all constraints honored"
      good: "One ranking fully correct; other has minor constraint violation"
      partial: "Rankings partially correct with some constraints violated"
      poor: "Rankings incorrect or constraints ignored"

  priority_score_computation:
    weight: 0.25
    criteria: >
      Assigns rank numbers 1-5 consistently and computes demand_rank - difficulty_rank
      for each feature. The specific scores depend on the chosen ranking encoding but
      should be internally consistent.
    scores:
      excellent: "Scores computed correctly from derived rankings"
      good: "Computation method correct but minor ranking error propagated"
      partial: "Method described but computation incomplete"
      poor: "No computation or method is incorrect"

  constraint_optimization:
    weight: 0.20
    criteria: >
      Correctly identifies that "difficulty ≤ top 2 difficulty units" means only
      F1 and F3 (the two easiest). Checks combinations: F1+F3 = 2 units (valid);
      any combination including F5, F4, or F2 exceeds 2 units. F1+F3 maximizes
      demand coverage within constraint (F1: rank 3 + F3: rank 4 demand = highest
      achievable with 2 units).
    scores:
      excellent: "Correct constraint interpretation; optimal combination identified"
      good: "Correct combination identified with slightly unclear reasoning"
      partial: "Constraint interpreted differently but valid alternative reasoning"
      poor: "Constraint ignored or incorrect combination chosen"

  revision_handling:
    weight: 0.20
    criteria: >
      Correctly revises difficulty ranking: F1 < F5 < F4 < F3 < F2.
      Recomputes priority scores accordingly. Notes the impact on priorities.
    scores:
      excellent: "Ranking correctly revised; scores recomputed; impact noted"
      good: "Ranking revised correctly; scores not fully recomputed"
      partial: "Partial revision"
      poor: "Cannot revise ranking"

reference_solution: |
  (a) Ordinal rankings (1 = lowest, 5 = highest):

  DIFFICULTY (easiest to hardest):
  1. F1 (dark mode)
  2. F3 (multi-language) [harder than F1; easier than F5]
  3. F5 (API)
  4. F4 (analytics) [harder than F5; easier than F2]
  5. F2 (offline sync) [hardest]

  USER DEMAND (lowest to highest):
  1. F4 (analytics) [less than F3, implied less than others]
  2. F5 (API) [less than F3; less than F1 — since F1 > F4 and F1 > F5]
  3. F1 (dark mode) [more than F4 and F5; less than F3]
  4. F3 (multi-language) [more than F1]
  5. F2 (offline sync) [highest]

  (b) Priority scores (demand_rank - difficulty_rank):
  F1: demand_rank=3, difficulty_rank=1 → score = +2
  F2: demand_rank=5, difficulty_rank=5 → score = 0
  F3: demand_rank=4, difficulty_rank=2 → score = +2
  F4: demand_rank=1, difficulty_rank=4 → score = -3
  F5: demand_rank=2, difficulty_rank=3 → score = -1

  Priority order: F1 = F3 (+2) > F2 (0) > F5 (-1) > F4 (-3)
  F1 and F3 are tied for highest priority.

  (c) Constraint: combined difficulty ≤ 2 units (i.e., only the 2 easiest features):
  Only F1 (rank 1) and F3 (rank 2) can be combined.
  F1 + F3 = 2 difficulty units ✓ (demand coverage = ranks 3 + 4 = highest possible)
  Any other 2-feature combo includes F5 (rank 3), exceeding limit.
  Best combination: F1 + F3.

  (d) Revised difficulty (F3 harder than F4):
  1. F1
  2. F5
  3. F4
  4. F3
  5. F2

  Revised priority scores:
  F1: demand=3, difficulty=1 → +2
  F2: demand=5, difficulty=5 → 0
  F3: demand=4, difficulty=4 → 0
  F4: demand=1, difficulty=3 → -2
  F5: demand=2, difficulty=2 → 0

  New priority order: F1 (+2) > F2 = F3 = F5 (0) > F4 (-2)
  F1 now clearly leads; F3 drops from tied-first to tied-second.

grader_type: model
tags: [ordinal_organization, ranking, constraint_satisfaction, priority]
