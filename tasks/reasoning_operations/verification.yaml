---
element_id: verification
element_name: "Verification"
category: reasoning_operations

prompt: |
  Below is a "proof" that 1 = 2. Find and precisely identify ALL errors.
  Then, for each correct step in the proof, verify that it is indeed valid.

  Alleged proof:
  Step 1: Let a = b = 1
  Step 2: Then a² = ab           (multiply both sides of a=b by a)
  Step 3: a² - b² = ab - b²      (subtract b² from both sides)
  Step 4: (a+b)(a-b) = b(a-b)    (factor both sides)
  Step 5: (a+b) = b               (divide both sides by (a-b))
  Step 6: 1 + 1 = 1               (substitute a=b=1)
  Step 7: 2 = 1                   (simplify)

  After identifying the error(s), answer:
  (a) Which steps are valid and which are invalid? Give a formal reason for each.
  (b) What is the SINGLE logical error that invalidates the entire proof?
  (c) Construct a valid proof of something trivially true (your choice) using
      exactly 5 steps, where you explicitly verify each step is valid.

success_criteria:
  - "(a) Correctly identifies steps 1-4 as valid (or with appropriate caveats), and step 5 as the invalid step (divides by zero: a-b = 0)"
  - "(b) Identifies division by zero as the single logical error"
  - "(c) Produces a valid 5-step proof with explicit step verification"

rubric:
  error_identification:
    weight: 0.45
    criteria: >
      Correctly identifies Step 5 as the sole error: dividing by (a-b) which equals
      zero since a=b=1. All other steps (1-4) are algebraically valid given the setup.
      Must state WHY (a-b)=0 makes division invalid.
    scores:
      excellent: "Step 5 identified as error with formal justification (division by zero)"
      good: "Correct error identified but justification incomplete"
      partial: "Error located approximately but incorrect formal reason"
      poor: "Identifies wrong step or misses the error entirely"

  step_validity_analysis:
    weight: 0.30
    criteria: >
      Explicitly validates each step:
      Steps 1-4: All valid algebraic operations
      Step 5: Invalid (division by zero since a=b implies a-b=0)
      Steps 6-7: Derived from the invalid Step 5, so invalid by inheritance
    scores:
      excellent: "All steps evaluated with correct validity judgment and reasons"
      good: "Most steps evaluated; minor omission"
      partial: "Some steps evaluated; significant omissions"
      poor: "Step-by-step analysis not provided"

  constructed_proof:
    weight: 0.25
    criteria: >
      Produces a valid 5-step proof of a simple mathematical fact. Each step is
      explicitly verified as valid (not just stated). Steps must be logically
      connected and the proof must actually prove what it claims.
    scores:
      excellent: "Valid 5-step proof with explicit per-step verification"
      good: "Valid proof but verification of steps is incomplete"
      partial: "Proof attempted but has minor errors"
      poor: "No valid proof constructed"

reference_solution: |
  (a) Step-by-step validity analysis:

  Step 1: a = b = 1
  VALID. Sets initial conditions. No logical issue.

  Step 2: a² = ab
  VALID. Multiplying both sides of a=b by a gives a·a = a·b, i.e., a² = ab. ✓

  Step 3: a² - b² = ab - b²
  VALID. Subtracting b² from both sides of Step 2. ✓

  Step 4: (a+b)(a-b) = b(a-b)
  VALID. Left side: standard factoring of difference of squares a²-b² = (a+b)(a-b). ✓
  Right side: ab-b² = b(a-b). ✓

  Step 5: (a+b) = b
  INVALID. This divides both sides by (a-b). But a=b=1, so a-b=0.
  Division by zero is undefined. This step is not a valid algebraic operation.
  The "cancellation" of (a-b) from both sides requires (a-b) ≠ 0, which is false here.

  Steps 6-7: Inherit the invalidity of Step 5. Even if the calculation were
  attempted, substituting a=b=1 into the invalid equation (a+b)=b gives 2=1,
  which is false. This is expected — the error introduced an impossible conclusion.

  (b) The single logical error: Division by zero.
  At Step 5, the proof divides both sides by (a-b). Since a=b=1 was established
  in Step 1, we have a-b=0. Division by zero is undefined in arithmetic; it does
  not preserve equality. Any "result" obtained by dividing by zero is meaningless.
  This is why mathematicians require that divisors be nonzero in algebraic manipulations.

  (c) Valid 5-step proof: sum of first n positive integers = n(n+1)/2

  Claim: 1 + 2 + 3 = 3 × 4 / 2 = 6

  Step 1: Define S = 1 + 2 + 3.
  VERIFY: S is a well-defined finite sum. Valid definition. ✓

  Step 2: Write the sum in reverse: S = 3 + 2 + 1.
  VERIFY: Addition is commutative; reversing order doesn't change the sum. ✓

  Step 3: Add the two expressions: 2S = (1+3) + (2+2) + (3+1) = 4 + 4 + 4.
  VERIFY: Each pair sums to 4 (1+3=4, 2+2=4, 3+1=4); three pairs. ✓

  Step 4: 2S = 3 × 4 = 12.
  VERIFY: Three groups of 4 equals 12. Multiplication check: 3×4=12. ✓

  Step 5: S = 6.
  VERIFY: Dividing both sides of 2S=12 by 2 (valid since 2≠0): S=6. ✓
  Check: 1+2+3=6 directly. ✓

grader_type: model
tags: [verification, proof_checking, logical_validity, mathematical_reasoning]
